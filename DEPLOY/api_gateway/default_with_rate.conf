events {
    worker_connections 1024;
}

http {
    # Định nghĩa vùng nhớ Rate Limit phải nằm trong block http
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

    server {
        listen 443 ssl;
        server_name 100.96.177.104; # IP Node 1 của sếp

        # Cấu hình mTLS & TLS 1.3
        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols TLSv1.3;
        ssl_verify_client on;
        ssl_client_certificate /etc/nginx/certs/ca.crt;

        location / {
            # BẬT KHIÊN RATE LIMIT Ở ĐÂY
            limit_req zone=api_limit burst=1 nodelay;
            limit_req_status 429;

            # Chống Header Spoofing
            proxy_set_header X-Client-Cert-Hash $ssl_client_fingerprint;
            
            # Đẩy traffic về Backend
            proxy_pass http://100.74.182.127:8000; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
