http
{
    limit_req_zone $binary_remote_addr zone=zap_limit:10m rate=5r/s;
server {
    listen 80;
    server_name 100.96.177.104;
    limit_req_status 429;
    location / {
        proxy_pass http://100.74.182.127:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        limit_req zone=zap_limit burst=10 nodelay;
    }
}
}